<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WORM AI - Cyber Intelligence Interface. Advanced OSINT tools and AI assistant." />
  <meta name="theme-color" content="#050505" />
  <meta name="robots" content="noindex, nofollow" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  
  <title>WORM AI - Cyber Intelligence Interface</title>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      margin: 0; 
      padding: 0; 
      background: #050505; 
      color: #e0e0e0; 
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }
    
    .loading-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050505;
      z-index: 9999;
    }
    
    .hexagon-spinner {
      width: 60px;
      height: 60px;
      position: relative;
    }
    
    .hexagon-spinner::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #00ff88, #00f0ff);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      animation: spin 2s linear infinite;
    }
    
    .hexagon-spinner::after {
      content: '';
      position: absolute;
      top: 10%;
      left: 10%;
      width: 80%;
      height: 80%;
      background: #050505;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 136, 0.3);
      border-radius: 3px;
    }
    
    ::selection {
      background: rgba(0, 255, 136, 0.3);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-container">
      <div class="hexagon-spinner"></div>
      <p style="margin-top: 24px; font-size: 12px; color: #00ff88; letter-spacing: 2px;">INITIALIZING WORM AI...</p>
    </div>
  </div>
  
  <script type="module" src="/src/main.tsx"></script>
  
  <script>
    (function() {
      try {
        const sessionId = 'worm_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
        sessionStorage.setItem('worm_session_id', sessionId);
        let deviceId = localStorage.getItem('worm_device_id');
        if (!deviceId) {
          deviceId = 'worm-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
          localStorage.setItem('worm_device_id', deviceId);
        }
        console.log('%c[WORM AI] Direct Access Mode', 'color: #00ff88; font-family: monospace;');
      } catch (e) {}
    })();
  </script>
</body>
</html>
